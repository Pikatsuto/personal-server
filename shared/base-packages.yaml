---
# AlmaLinux bootc (no official Rocky bootc exists — the community
# rocky-bootc was archived 2025-04, its author migrated to AlmaLinux).
# AlmaLinux is binary-compatible with Rocky (both rebuild RHEL).
#
# Tag `:latest` is intentional: this repo is an immutable image built by
# GitHub Actions, so a breaking upstream bump shows up as a failed CI
# build (email notification) and the bad image is never pushed to ghcr
# — the running server keeps booting the last-known-good tag. The goal
# of this whole project is zero-maintenance auto-bumps.
base_image:
  repo: quay.io/almalinuxorg/almalinux-bootc
  digest: "sha256:9cb24535463899d905429eb3e915254af84c84de9e33fc9f1171be6f184b6382" # pinned by CI after successful test, empty = :latest
# ZFS install needs a 3-step dance (release rpm → switch repo → install) that
# yq can't express, so it lives in shared/lib/install-base.sh which is called
# by the base-common stage in build/templates/Dockerfile.tmpl. Only the
# OS-distro packages live here.
packages:
  - bash
  - curl
  - jq
  - rsync
  - tar
  - gzip
  - xz
  - ca-certificates
  - openssl
  - dnf-plugins-core
  - gettext
  - systemd
  - cronie
  - iproute
  - iputils
  - util-linux
  - which
  - findutils
  - python3
  - python3-pip
  - fish
copr_repos: []
extra_repos: []
binaries:
  yq:
    url: https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
    target: /usr/local/bin/yq
    mode: "0755"
