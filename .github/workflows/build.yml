name: build

on:
  push:
    branches: [main, dev]
  schedule:
    # Weekly prod rebuild Sunday 02:00 UTC to pick up upstream version bumps
    # (AlmaLinux bootc, ZFS kmod, Incus COPR, Pangolin/Coolify/Docker/etc.).
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: dev | prod
        default: prod
        type: choice
        options: [dev, prod]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: personal-server

jobs:
  # ─── Determine mode + tag ───────────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.m.outputs.mode }}
      tag:  ${{ steps.m.outputs.tag }}
    steps:
      - id: m
        run: |
          event='${{ github.event_name }}'
          ref='${{ github.ref }}'
          if [[ $event == workflow_dispatch ]]; then
            mode='${{ inputs.mode }}'
          elif [[ $event == schedule ]]; then
            mode=prod
          elif [[ $ref == refs/heads/main ]]; then
            mode=prod
          elif [[ $ref == refs/heads/dev ]]; then
            mode=dev
          else
            mode=dev
          fi
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "tag=${mode}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  # ─── Build the OCI image (linear chain — one job for the whole graph) ──
  # The chain architecture means services aren't independently buildable, but
  # BuildKit still caches every layer granularly: re-builds only touch stages
  # whose sources changed, everything earlier in the chain is cache-hit.
  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Free runner disk space
        # AlmaLinux bootc + all services = ~2GB image; matrix runners
        # typically have ~14GB free after the pre-installed software.
        # Pruning the Android SDK + CodeQL buys ~10GB if we need it.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
      - name: Build
        env:
          REGISTRY: ${{ env.REGISTRY }}/${{ github.repository_owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          TAG: ${{ needs.discover.outputs.tag }}
          # Weekly schedule rebuilds from scratch (--pull --no-cache) so
          # upstream bumps (AlmaLinux bootc digest, EPEL / ZFS kmod / docker-ce
          # / Incus COPR / WebZFS HEAD / Zabbly incus-ui / …) actually land in
          # the image. Manual or push builds stay cache-friendly.
          NO_CACHE: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: |
          chmod +x build/generate.sh build/build.sh \
                   shared/lib/*.sh shared/first-boot/*.sh \
                   services/*/install.sh services/*/configure.sh \
                   bin/*
          ./build/build.sh '${{ needs.discover.outputs.mode }}'
      - name: Push
        id: push
        run: |
          img='${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}'
          tag='${{ needs.discover.outputs.tag }}'
          mode='${{ needs.discover.outputs.mode }}'
          docker push "${img}:${tag}"
          # `latest` points at the most recent prod build, `dev` at the most
          # recent dev build. Both moves are atomic on ghcr.io.
          if [[ $mode == prod ]]; then
            docker tag  "${img}:${tag}" "${img}:latest"
            docker push "${img}:latest"
          else
            docker tag  "${img}:${tag}" "${img}:dev"
            docker push "${img}:dev"
          fi
          echo "image=${img}:${tag}" >> "$GITHUB_OUTPUT"
      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-report-${{ needs.discover.outputs.tag }}
          path: |
            build/report.json
            build/logs/
          if-no-files-found: ignore
      - name: Upload manifest
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: manifest-${{ needs.discover.outputs.tag }}
          path: build/manifest.txt
          if-no-files-found: error

  # ─── Build the install ISO via bootc-image-builder (prod only) ─────────
  iso:
    needs: [discover, build]
    if: needs.discover.outputs.mode == 'prod'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
      - name: Build ISO via bootc-image-builder
        run: |
          mkdir -p out
          sudo docker run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v "$PWD/out:/output" \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --rootfs xfs \
            '${{ needs.build.outputs.image }}'
      - uses: actions/upload-artifact@v4
        with:
          name: personal-server-iso-${{ needs.discover.outputs.tag }}
          path: out/**/*.iso
          if-no-files-found: error

  # ─── Rolling "weekly" release (main branch only) ───────────────────────
  # Single GitHub release with a fixed tag `weekly` that is updated in place
  # on every successful main-branch build (push-to-main OR scheduled cron).
  # Assets: the ISO + the build manifest. Body: git log + package diff vs
  # the previous release, so the release notes show exactly what moved
  # between two prod builds.
  release:
    needs: [discover, build, iso]
    if: needs.discover.outputs.mode == 'prod'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for `git log <prev>..HEAD`
      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: personal-server-iso-${{ needs.discover.outputs.tag }}
          path: out/
      - name: Download new manifest
        uses: actions/download-artifact@v4
        with:
          name: manifest-${{ needs.discover.outputs.tag }}
          path: new/
      - name: Fetch previous release state
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p prev
          if gh release view weekly --json targetCommitish,name >/dev/null 2>&1; then
            prev_sha=$(gh release view weekly --json targetCommitish -q .targetCommitish)
            echo "prev_sha=$prev_sha" >> "$GITHUB_OUTPUT"
            gh release download weekly -p manifest.txt -D prev/ 2>/dev/null || true
            echo "exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "exists=0" >> "$GITHUB_OUTPUT"
          fi
      - name: Compose release notes
        id: notes
        run: |
          prev_sha='${{ steps.prev.outputs.prev_sha }}'
          {
            echo "# Weekly rolling release"
            echo
            echo "Rolling tag kept in place and refreshed on every successful main-branch build."
            echo
            echo "- **Build tag:** \`${{ needs.discover.outputs.tag }}\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo "- **Image:** \`${{ needs.build.outputs.image }}\`"
            echo "- **Built at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Commits since previous release"
            if [[ -n $prev_sha ]]; then
              if log=$(git log --oneline --no-merges "${prev_sha}..${{ github.sha }}" 2>/dev/null); then
                if [[ -n $log ]]; then
                  echo '```'
                  echo "$log"
                  echo '```'
                else
                  echo '_No new commits since previous release (rebuild only — probably a weekly pulling upstream bumps)._'
                fi
              else
                echo '_Previous release SHA not in history — showing last 20 commits:_'
                echo '```'
                git log --oneline --no-merges -20
                echo '```'
              fi
            else
              echo '_First release — no previous state to compare against._'
            fi
            echo
            echo "## Package / image changes since previous release"
            if [[ -f prev/manifest.txt && -f new/manifest.txt ]]; then
              if d=$(diff -U0 prev/manifest.txt new/manifest.txt 2>/dev/null); then
                echo '_No manifest changes._'
              else
                echo '```diff'
                diff -U0 prev/manifest.txt new/manifest.txt \
                  | grep -E '^[+-][^+-]' \
                  | head -200
                echo '```'
              fi
            else
              echo '_No previous manifest on file — first release._'
            fi
          } > release-notes.md
          echo "wrote $(wc -l <release-notes.md) lines"
      - name: Create or update `weekly` release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Weekly rolling — ${{ needs.discover.outputs.tag }}"
          if [[ '${{ steps.prev.outputs.exists }}' == '1' ]]; then
            gh release edit weekly \
              --title "$title" \
              --notes-file release-notes.md \
              --target '${{ github.sha }}' \
              --latest
            gh release upload weekly out/**/*.iso new/manifest.txt --clobber
          else
            gh release create weekly out/**/*.iso new/manifest.txt \
              --title "$title" \
              --notes-file release-notes.md \
              --target '${{ github.sha }}' \
              --latest
          fi
