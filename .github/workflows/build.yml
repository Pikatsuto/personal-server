name: build

on:
  push:
    branches: [main, dev]
  schedule:
    # Sunday 23:00 UTC = right before the host's Monday 03:00 update wave.
    # Build typically takes 6 minutes, plus margin for ghcr push, so the
    # new image is reliably available on the registry by 23:30 UTC,
    # leaving ~3-4h before bootc-fetch-apply-updates fires on the host.
    - cron: '0 23 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: dev | prod
        default: prod
        type: choice
        options: [dev, prod]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: personal-server

jobs:
  # ─── Determine mode + tag ───────────────────────────────────────────────
  discover:
    runs-on: ubuntu-latest
    outputs:
      mode:  ${{ steps.m.outputs.mode }}
      tag:   ${{ steps.m.outputs.tag }}
      owner: ${{ steps.m.outputs.owner }}
    steps:
      - id: m
        run: |
          event='${{ github.event_name }}'
          ref='${{ github.ref }}'
          if [[ $event == workflow_dispatch ]]; then
            mode='${{ inputs.mode }}'
          elif [[ $event == schedule ]]; then
            mode=prod
          elif [[ $ref == refs/heads/main ]]; then
            mode=prod
          elif [[ $ref == refs/heads/dev ]]; then
            mode=dev
          else
            mode=dev
          fi
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "tag=${mode}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "owner=$owner" >> "$GITHUB_OUTPUT"

  # ─── Full validate-and-publish cycle ────────────────────────────────────
  # build/build.sh does:
  #   build #1 (all :latest) → run-tests --from-latest → patch yamls
  #   → build #2 (digest-pinned) → run-tests --from-yaml
  #   → only if both passes: tag floating alias and leave yaml diffs
  #
  # This job pushes the resulting image and (on prod/main) commits the
  # yaml diffs back to main with [skip ci].
  build:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write       # for the [skip ci] commit-back of validated digests
      packages: write       # for ghcr.io push
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0    # full history needed for git commit-back
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq
      - name: Free runner disk space
        # AlmaLinux bootc + all services + the test container = ~4 GB peak.
        # Standard runners have ~14 GB free; pruning toolcaches buys ~10 more.
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
          docker system prune -af || true
      - name: Install QEMU/KVM for E2E tests
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils
          # GitHub runners expose /dev/kvm — just ensure the permissions
          sudo chmod 666 /dev/kvm || true

      - name: Run validate cycle (build #1 → tests → patch → build #2 → tests)
        env:
          REGISTRY: ${{ env.REGISTRY }}/${{ needs.discover.outputs.owner }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          # Weekly schedule rebuilds from scratch (--pull --no-cache) so
          # OS-level upstream bumps actually land. Manual or push builds
          # stay cache-friendly.
          NO_CACHE: ${{ github.event_name == 'schedule' && '1' || '0' }}
        run: |
          chmod +x build/generate.sh build/build.sh build/run-tests.sh \
                   shared/lib/*.sh shared/first-boot/*.sh \
                   services/*/install.sh services/*/configure.sh \
                   services/*/test.sh tests/*.sh \
                   bin/*
          ./build/build.sh '${{ needs.discover.outputs.mode }}'

      - name: Push image
        id: push
        run: |
          img='${{ env.REGISTRY }}/${{ needs.discover.outputs.owner }}/${{ env.IMAGE_NAME }}'
          tag='${{ needs.discover.outputs.tag }}'
          mode='${{ needs.discover.outputs.mode }}'
          docker push "${img}:${tag}"
          if [[ $mode == prod ]]; then
            docker push "${img}:latest"
          else
            docker push "${img}:dev"
          fi
          echo "image=${img}:${tag}" >> "$GITHUB_OUTPUT"

      - name: Commit validated digest bumps back to main
        if: |
          needs.discover.outputs.mode == 'prod' &&
          github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain services/*/service.yaml shared/base-packages.yaml)" ]]; then
            echo "No yaml diff to commit (no upstream digests changed)."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add services/*/service.yaml shared/base-packages.yaml
          git commit -m "chore(versions): bump validated digests [skip ci]" \
                     -m "Triggered by ${{ github.event_name }} on ${{ github.ref_name }}." \
                     -m "Image: ${{ steps.push.outputs.image }}"
          git push origin HEAD:${{ github.ref_name }}

      - name: Upload build report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-report-${{ needs.discover.outputs.tag }}
          path: |
            build/report.json
            build/logs/
            build/results-*.json
          if-no-files-found: ignore
      - name: Upload manifest
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: manifest-${{ needs.discover.outputs.tag }}
          path: build/manifest.txt
          if-no-files-found: error

  # ─── Build the install ISO via bootc-image-builder (prod only) ─────────
  iso:
    needs: [discover, build]
    if: needs.discover.outputs.mode == 'prod'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL || true
      - name: Build net-install ISO
        run: |
          img='${{ env.REGISTRY }}/${{ needs.discover.outputs.owner }}/${{ env.IMAGE_NAME }}:latest'
          mkdir -p out
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v "$PWD/out:/output" \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type anaconda-iso \
            --rootfs xfs \
            --use-librepo=false \
            --installer-payload-ref "${img}" \
            "${img}"
          sudo chown -R "$(id -u):$(id -g)" out/
      - uses: actions/upload-artifact@v7
        with:
          name: personal-server-iso-${{ needs.discover.outputs.tag }}
          path: out/**/*.iso
          if-no-files-found: error

  # ─── Rolling "weekly" release (main branch only) ───────────────────────
  release:
    needs: [discover, build, iso]
    if: needs.discover.outputs.mode == 'prod'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download ISO
        uses: actions/download-artifact@v8
        with:
          name: personal-server-iso-${{ needs.discover.outputs.tag }}
          path: out/
      - name: Download new manifest
        uses: actions/download-artifact@v8
        with:
          name: manifest-${{ needs.discover.outputs.tag }}
          path: new/
      - name: Fetch previous release state
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p prev
          if gh release view weekly --json targetCommitish,name >/dev/null 2>&1; then
            prev_sha=$(gh release view weekly --json targetCommitish -q .targetCommitish)
            echo "prev_sha=$prev_sha" >> "$GITHUB_OUTPUT"
            gh release download weekly -p manifest.txt -D prev/ 2>/dev/null || true
            echo "exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "exists=0" >> "$GITHUB_OUTPUT"
          fi
      - name: Compose release notes
        run: |
          prev_sha='${{ steps.prev.outputs.prev_sha }}'
          {
            echo "# Weekly rolling release"
            echo
            echo "Rolling tag kept in place and refreshed on every successful main-branch build."
            echo
            echo "- **Build tag:** \`${{ needs.discover.outputs.tag }}\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo "- **Image:** \`${{ needs.build.outputs.image }}\`"
            echo "- **Built at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "## Commits since previous release"
            if [[ -n $prev_sha ]]; then
              if log=$(git log --oneline --no-merges "${prev_sha}..${{ github.sha }}" 2>/dev/null); then
                if [[ -n $log ]]; then
                  echo '```'
                  echo "$log"
                  echo '```'
                else
                  echo '_No new commits since previous release (rebuild only — probably a weekly pulling upstream bumps)._'
                fi
              else
                echo '_Previous release SHA not in history — showing last 20 commits:_'
                echo '```'
                git log --oneline --no-merges -20
                echo '```'
              fi
            else
              echo '_First release — no previous state to compare against._'
            fi
            echo
            echo "## Package / image changes since previous release"
            if [[ -f prev/manifest.txt && -f new/manifest.txt ]]; then
              if d=$(diff -U0 prev/manifest.txt new/manifest.txt 2>/dev/null); then
                echo '_No manifest changes._'
              else
                echo '```diff'
                diff -U0 prev/manifest.txt new/manifest.txt \
                  | grep -E '^[+-][^+-]' \
                  | head -200
                echo '```'
              fi
            else
              echo '_No previous manifest on file — first release._'
            fi
          } > release-notes.md
          echo "wrote $(wc -l <release-notes.md) lines"
      - name: Create or update `weekly` release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Weekly rolling — ${{ needs.discover.outputs.tag }}"
          if [[ '${{ steps.prev.outputs.exists }}' == '1' ]]; then
            gh release edit weekly \
              --title "$title" \
              --notes-file release-notes.md \
              --target '${{ github.sha }}' \
              --latest
            gh release upload weekly out/**/*.iso new/manifest.txt --clobber
          else
            gh release create weekly out/**/*.iso new/manifest.txt \
              --title "$title" \
              --notes-file release-notes.md \
              --target '${{ github.sha }}' \
              --latest
          fi
