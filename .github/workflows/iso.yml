name: iso

on:
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: personal-server

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      owner: ${{ steps.m.outputs.owner }}
      img:   ${{ steps.m.outputs.img }}
    steps:
      - id: m
        run: |
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "owner=$owner" >> "$GITHUB_OUTPUT"
          echo "img=${{ env.REGISTRY }}/${owner}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"

  iso:
    needs: discover
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - uses: actions/checkout@v6

      - name: Install mkksiso
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lorax

      - name: Download AlmaLinux boot ISO
        run: |
          mkdir -p out
          ALMA_ISO_URL=$(curl -sL https://mirrors.almalinux.org/mirrorlist/9/boot | head -1)
          curl -fSL "${ALMA_ISO_URL}x86_64/iso/" -o /dev/null 2>&1 || true
          # Use a known mirror directly
          curl -fSL "https://repo.almalinux.org/almalinux/9/isos/x86_64/" \
            -o /tmp/isos.html 2>/dev/null
          BOOT_ISO=$(grep -oP 'AlmaLinux-9[^"]*-boot-x86_64\.iso' /tmp/isos.html | sort -V | tail -1)
          curl -fSL "https://repo.almalinux.org/almalinux/9/isos/x86_64/${BOOT_ISO}" \
            -o out/boot.iso
          echo "BOOT_ISO=out/boot.iso" >> "$GITHUB_ENV"

      - name: Render kickstart and inject into ISO
        run: |
          img='${{ needs.discover.outputs.img }}'
          sed "s|__BOOTC_IMAGE_REF__|${img}|g" \
            build/kickstart/personal-server.ks > out/ks.cfg
          mkksiso -c 'inst.ks=file:///run/install/repo/ks.cfg' \
            --ks out/ks.cfg \
            "$BOOT_ISO" out/personal-server-netinstall.iso
          rm -f "$BOOT_ISO" out/ks.cfg

      - name: Fetch previous release state
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view install-iso --json name >/dev/null 2>&1; then
            echo "exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "exists=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Compose release notes
        run: |
          img='${{ needs.discover.outputs.img }}'
          {
            echo "# Net-install ISO"
            echo
            echo "AlmaLinux boot ISO with kickstart that pulls \`${img}\` from GHCR at install time."
            echo
            echo "- **Image:** \`${img}\`"
            echo "- **Built at:** $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "- **Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})"
            echo
            echo "Boot the ISO, pick a disk, and the installer pulls the latest image from the registry."
          } > release-notes.md

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Net-install ISO — $(date -u +%Y-%m-%d)"
          if [[ '${{ steps.prev.outputs.exists }}' == '1' ]]; then
            gh release edit install-iso \
              --title "$title" \
              --notes-file release-notes.md \
              --target '${{ github.sha }}' \
              --latest=false
            gh release upload install-iso out/personal-server-netinstall.iso --clobber
          else
            gh release create install-iso out/personal-server-netinstall.iso \
              --title "$title" \
              --notes-file release-notes.md \
              --target '${{ github.sha }}' \
              --latest=false
          fi
