name: iso

on:
  workflow_dispatch: {}

jobs:
  iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Install xorriso and isolinux
        run: sudo apt-get update -qq && sudo apt-get install -y -qq xorriso isolinux

      - name: Download AlmaLinux boot ISO
        run: |
          mkdir -p out
          curl -fSL "https://repo.almalinux.org/almalinux/9/isos/x86_64/" \
            -o /tmp/isos.html
          BOOT_ISO=$(grep -oP 'AlmaLinux-[^"]*-latest-x86_64-boot\.iso' /tmp/isos.html | head -1)
          curl -fSL "https://repo.almalinux.org/almalinux/9/isos/x86_64/${BOOT_ISO}" \
            -o out/boot.iso

      - name: Inject kickstart URL into ISO
        run: |
          KS_URL="https://raw.githubusercontent.com/${{ github.repository }}/main/build/kickstart/personal-server.ks"
          WORKDIR=$(mktemp -d)

          xorriso -osirrox on -indev out/boot.iso -extract / "$WORKDIR"
          chmod -R u+w "$WORKDIR"

          # Patch UEFI grub to auto-load kickstart from GitHub
          sed -i "s|inst\.stage2|inst.ks=${KS_URL} inst.stage2|" \
            "$WORKDIR/EFI/BOOT/grub.cfg"

          # Patch BIOS isolinux
          if [[ -f "$WORKDIR/isolinux/isolinux.cfg" ]]; then
            sed -i "s|inst\.stage2|inst.ks=${KS_URL} inst.stage2|" \
              "$WORKDIR/isolinux/isolinux.cfg"
          fi

          # Rebuild ISO (BIOS + UEFI hybrid)
          xorriso -as mkisofs \
            -o out/personal-server-netinstall.iso \
            -R -J -V "PS-NETINSTALL" \
            -b isolinux/isolinux.bin \
            -c isolinux/boot.cat \
            -no-emul-boot -boot-load-size 4 -boot-info-table \
            -eltorito-alt-boot \
            -e images/efiboot.img \
            -no-emul-boot \
            -isohybrid-mbr /usr/lib/ISOLINUX/isohdpfx.bin \
            -isohybrid-gpt-basdat \
            "$WORKDIR"

          rm -rf "$WORKDIR" out/boot.iso
          ls -lh out/personal-server-netinstall.iso

      - name: Fetch previous release state
        id: prev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view install-iso --json name >/dev/null 2>&1; then
            echo "exists=1" >> "$GITHUB_OUTPUT"
          else
            echo "exists=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Net-install ISO — $(date -u +%Y-%m-%d)"
          notes="Boot this ISO to install personal-server. Anaconda fetches the kickstart from GitHub and pulls the latest image from GHCR at install time."
          if [[ '${{ steps.prev.outputs.exists }}' == '1' ]]; then
            gh release edit install-iso \
              --title "$title" \
              --notes "$notes" \
              --target '${{ github.sha }}' \
              --latest=false
            gh release upload install-iso out/personal-server-netinstall.iso --clobber
          else
            gh release create install-iso out/personal-server-netinstall.iso \
              --title "$title" \
              --notes "$notes" \
              --target '${{ github.sha }}' \
              --latest=false
          fi
