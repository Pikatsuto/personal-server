---
name: keycloak
display_name: Keycloak
description: OIDC identity provider. Used as SSO for all services that support it, and as forward-auth backend (via traefik-forward-auth) for the ones that don't.
depends_on: [docker]
build:
  packages: []
  install_script: install.sh
storage:
  data_path: /var/lib/keycloak
  pool_key: keycloak
  default_dataset_name: keycloak
  migration_strategy: rsync-only
runtime:
  systemd_units:
    - personal-server-keycloak.service
  stop_cmd: systemctl stop personal-server-keycloak
  start_cmd: systemctl start personal-server-keycloak
  health:
    type: http
    url: http://localhost:8180/health/ready
images:
  keycloak:
    repo: quay.io/keycloak/keycloak
    digest: "sha256:5afd40414096432903a5374ba4ba70b931dcca598a6bd9f44239fe66ef8d9737"
  postgres:
    repo: docker.io/postgres
    tag: 16-alpine
    digest: "sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229"
# `config:` block — arbitrary service-specific config values. Each key is
# exported by render-all-units.sh as PS_<SERVICE>_<KEY> so any other
# service's template can reference it (e.g. ${PS_KEYCLOAK_REALM}).
config:
  realm: personal-server
# `credentials_file:` is an optional path to a KEY=VALUE file shown in
# the wizard's final summary. Used for admin credentials generated by
# the service's configure.sh.
credentials_file: /etc/personal-server/keycloak-admin.txt
secrets:
  - key: keycloak_db_password
    generate: "openssl rand -base64 24"
  - key: keycloak_admin_client_secret
    generate: "openssl rand -hex 32"
wizard:
  questions:
    - key: admin_username
      prompt: "Admin username (used across all services: Keycloak, Coolify, …)"
      required: true
    - key: admin_email
      prompt: "Admin email"
      required: true
    - key: admin_password
      prompt: "Admin password"
      type: secret
      required: true
proxy:
  resource_name: keycloak
  subdomain: auth
  upstream: http://keycloak:8080
  auth: public
test:
  script: test.sh
configure:
  first_boot: configure.sh
