---
name: watchtower
display_name: Watchtower
description: Auto-updates Docker containers (one-shot, weekly)
depends_on: [docker]
build:
  packages: []
  install_script: install.sh
runtime:
  systemd_units:
    - personal-server-watchtower.timer
images:
  watchtower:
    repo: docker.io/nickfedor/watchtower
    digest: ""
test:
  script: test.sh
configure:
  first_boot: configure.sh
