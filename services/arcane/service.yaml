---
name: arcane
display_name: Arcane
description: Web UI for Docker host management
depends_on: [docker, traefik]
build:
  packages: []
  install_script: install.sh
storage:
  data_path: /var/lib/personal-server/arcane
  pool_key: arcane
  default_dataset_name: arcane
  migration_strategy: rsync-only
runtime:
  systemd_units:
    - personal-server-arcane.service
  stop_cmd: systemctl stop personal-server-arcane
  start_cmd: systemctl start personal-server-arcane
  health:
    type: http
    url: http://localhost:3552
proxy:
  subdomain: docker
  upstream: http://personal-server-arcane:3552
  auth: sso
sso:
  method: env
  # Separate file from arcane.env (app secrets) to avoid clobbering
  env_file: /etc/personal-server/arcane-oidc.env
  vars:
    OIDC_ENABLED: "true"
    OIDC_CLIENT_ID: "arcane"
    OIDC_CLIENT_SECRET: "${PS_ARCANE_OIDC_CLIENT_SECRET}"
    OIDC_ISSUER_URL: "https://auth.${PS_DOMAIN}/realms/${PS_KEYCLOAK_REALM}"
    OIDC_ADMIN_CLAIM: "groups"
    OIDC_ADMIN_VALUE: "admin"
images:
  arcane:
    repo: ghcr.io/getarcaneapp/arcane
    digest: "sha256:6d8a51ddca2399106ea20da9db17271a91dd97150cada449aba4edce2ae682c2"
secrets:
  - key: arcane_encryption_key
    generate: "openssl rand -hex 32"
  - key: arcane_jwt_secret
    generate: "openssl rand -hex 32"
  - key: arcane_oidc_client_secret
    generate: "openssl rand -hex 32"
wizard:
  questions:
    - key: domain
      prompt: "Root domain (e.g. home.example.com)"
      required: true
test:
  script: test.sh
configure:
  first_boot: configure.sh
