---
name: pocketid
display_name: PocketID
description: Lightweight passkey-based OIDC identity provider, used as IdP for Pangolin
depends_on: [docker, pangolin]
build:
  packages: []
  install_script: install.sh
storage:
  data_path: /var/lib/personal-server/pocketid
  pool_key: pocketid
  default_dataset_name: pocketid
  migration_strategy: rsync-only
runtime:
  systemd_units:
    - personal-server-pocketid.service
  stop_cmd: systemctl stop personal-server-pocketid
  start_cmd: systemctl start personal-server-pocketid
  health:
    # Verified 2026-04-11 against the upstream docker-compose.yml at
    # github.com/pocket-id/pocket-id — there is no HTTP /healthz endpoint;
    # the official healthcheck is the embedded `/app/pocket-id healthcheck`
    # binary. We invoke it via `docker exec`.
    type: exec
    url: docker exec personal-server-pocketid /app/pocket-id healthcheck
sso:
  type: none
proxy:
  resource_name: pocketid
  subdomain: pocketid
  upstream: http://personal-server-pocketid:1411
  auth: public
images:
  pocketid:
    repo: ghcr.io/pocket-id/pocket-id
    digest: ""
secrets:
  - key: pocketid_encryption_key
    generate: "openssl rand -base64 32"
wizard:
  questions:
    - key: domain
      prompt: "Root domain (e.g. home.example.com)"
      required: true
checklist:
  priority: 2
  steps:
    - title: "Open PocketID and create the admin (passkey)"
      body: |
        URL:      https://pocketid.${PS_DOMAIN}
        Then:     Settings → Admin → API Keys → Generate
        Save it:  echo '<paste-key>' > /etc/personal-server/pocketid-api-key
                  chmod 600 /etc/personal-server/pocketid-api-key
    - title: "Create the OIDC client in PocketID for Pangolin"
      body: |
        In PocketID: OIDC Clients → Add Client
          Name:           pangolin
          Callback URLs:  https://pangolin.${PS_DOMAIN}/auth/callback
          PKCE:           off
        Copy the generated Client ID + Secret back into the Pangolin
        IdP form from the previous step, then Save.
test:
  script: test.sh
configure:
  first_boot: configure.sh
