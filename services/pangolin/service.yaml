---
name: pangolin
display_name: Pangolin
description: WireGuard VPN + Traefik reverse-proxy + identity-aware access control
depends_on: [docker]
build:
  packages: []
  install_script: install.sh
storage:
  data_path: /var/lib/personal-server/pangolin
  pool_key: pangolin
  default_dataset_name: pangolin
  migration_strategy: rsync-only
runtime:
  systemd_units:
    - personal-server-pangolin.service
  stop_cmd: systemctl stop personal-server-pangolin
  start_cmd: systemctl start personal-server-pangolin
  health:
    type: http
    url: http://localhost:3001/api/v1/healthz
images:
  pangolin:
    repo: docker.io/fosrl/pangolin
    digest: "sha256:c8002c5acf73a6e6e85f61be38036b4eb35afeb99c4d52501c737f0257d4c673" # populated by CI when test.sh passes against :latest
  gerbil:
    repo: docker.io/fosrl/gerbil
    digest: "sha256:bfe419f2b5403bc7005e06bdce8eee9dde13cd4ad6453078b4f7ee6fc898a520"
  traefik:
    repo: docker.io/traefik
    digest: "sha256:34d5089d0b414945342848518b383f11f5b3a645504ed87b77ffeb9d683d0e48"
secrets:
  - key: pangolin_secret
    generate: "openssl rand -hex 32"
  - key: badger_version
    generate: "curl -fsSL https://api.github.com/repos/fosrl/badger/releases/latest | jq -r .tag_name"
wizard:
  questions:
    - key: domain
      prompt: "Root domain (e.g. home.example.com)"
      required: true
    - key: acme_email
      prompt: "Email for Let's Encrypt notifications"
      required: true
    - key: acme_dns_provider
      prompt: "DNS provider for ACME wildcard (any Lego name)"
      default: cloudflare
    - key: acme_dns_credentials
      prompt: "DNS provider credentials (env vars for Lego)"
      type: secret_map
checklist:
  priority: 1
  steps:
    - title: "Open Pangolin and create the admin account"
      token_file: /etc/personal-server/pangolin-setup-token
      body: |
        URL:      https://pangolin.${PS_DOMAIN}/setup
        Then:     Settings → API Keys → Create root key
        Save it:  echo '<paste-key>' > /etc/personal-server/pangolin-api-key
                  chmod 600 /etc/personal-server/pangolin-api-key
    - title: "Wire PocketID into Pangolin as an OIDC IdP"
      body: |
        In Pangolin: Settings → Identity Providers → Add → OAuth2/OIDC
        Paste:
          Issuer URL:        https://pocketid.${PS_DOMAIN}
          Authorization URL: https://pocketid.${PS_DOMAIN}/authorize
          Token URL:         https://pocketid.${PS_DOMAIN}/api/oidc/token
          Userinfo URL:      https://pocketid.${PS_DOMAIN}/api/oidc/userinfo
          Client ID:         (from PocketID OIDC client, see next step)
          Client Secret:     (from PocketID OIDC client, see next step)
          Identifier path:   sub
          Email path:        email
          Name path:         name
          Scopes:            openid profile email
test:
  script: test.sh
configure:
  first_boot: configure.sh
