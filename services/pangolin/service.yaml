---
name: pangolin
display_name: Pangolin
description: WireGuard VPN + Traefik reverse-proxy + identity-aware access control
depends_on: [docker]
build:
  packages: []
  install_script: install.sh
storage:
  data_path: /var/lib/personal-server/pangolin
  pool_key: pangolin
  default_dataset_name: pangolin
  migration_strategy: rsync-only
runtime:
  systemd_units:
    - personal-server-pangolin.service
  stop_cmd: systemctl stop personal-server-pangolin
  start_cmd: systemctl start personal-server-pangolin
  health:
    type: http
    url: http://localhost:3001/api/v1/healthz
images:
  pangolin:
    repo: docker.io/fosrl/pangolin
    digest: ""        # populated by CI when test.sh passes against :latest
  gerbil:
    repo: docker.io/fosrl/gerbil
    digest: ""
  traefik:
    repo: docker.io/traefik
    digest: ""
secrets:
  - key: pangolin_secret
    generate: "openssl rand -hex 32"
wizard:
  questions:
    - key: domain
      prompt: "Root domain (e.g. home.example.com)"
      required: true
    - key: acme_email
      prompt: "Email for Let's Encrypt notifications"
      required: true
    - key: acme_dns_provider
      prompt: "DNS provider for ACME wildcard (any Lego name)"
      default: cloudflare
    - key: acme_dns_credentials
      prompt: "DNS provider credentials (env vars for Lego)"
      type: secret_map
test:
  script: test.sh
configure:
  first_boot: configure.sh
