---
name: coolify
display_name: Coolify
description: Self-hosted PaaS. Its bundled Traefik is bypassed by joining the
             shared `coolify` Docker network with our Traefik, which discovers
             Coolify-deployed apps via their auto-generated traefik.* labels.
depends_on: [docker, traefik]
build:
  packages: []
  install_script: install.sh
storage:
  data_path: /data/coolify
  pool_key: coolify
  default_dataset_name: coolify
  migration_strategy: rsync-only
runtime:
  systemd_units:
    - personal-server-coolify.service
  stop_cmd: systemctl stop personal-server-coolify
  start_cmd: systemctl start personal-server-coolify
  health:
    type: http
    url: http://localhost:8000
proxy:
  subdomain: coolify
  upstream: http://coolify:8080
  # No OIDC auth: waiting on Coolify PR #6696 for generic OIDC provider
  # support. Until then, Coolify manages its own login/password.
  auth: public
credentials_file: /etc/personal-server/coolify-root.txt
secrets:
  - key: coolify_oidc_client_secret
    generate: "openssl rand -hex 32"
wizard:
  questions:
    - key: domain
      prompt: "Root domain (e.g. home.example.com)"
      required: true
    - key: acme_email
      prompt: "Email for Let's Encrypt notifications"
      required: true
test:
  script: test.sh
configure:
  first_boot: configure.sh
